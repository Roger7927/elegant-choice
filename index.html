<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Choice | Boutique de Luxo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <h1>ELEGANT CHOICE</h1>
        <div class="gold-line"></div>
        <p class="subtitle">A ESSÊNCIA DA SOFISTICAÇÃO EM CADA FRASCO</p>
    </header>

    <main class="container">
        <section class="grid">
            <div class="card">
                <div class="img-box">
                    <img src="img/idole.png" alt="Lancôme Idôle" onerror="this.src='https://via.placeholder.com/250x300?text=Imagem+Carregando'">
                </div>
                <h3>Lancôme Idôle</h3>
                <p>Floral Chipre Moderno</p>
                <a href="#" class="btn">DETALHES</a>
            </div>

            <div class="card">
                <div class="img-box">
                    <img src="img/scandal.png" alt="Scandal" onerror="this.src='https://via.placeholder.com/250x300?text=Imagem+Carregando'">
                </div>
                <h3>Scandal Le Parfum</h3>
                <p>Âmbar Floral Intenso</p>
                <a href="#" class="btn">DETALHES</a>
            </div>

            <div class="card">
                <div class="img-box">
                    <img src="img/libre.jpg" alt="Libre YSL" onerror="this.src='https://via.placeholder.com/250x300?text=Imagem+Carregando'">
                </div>
                <h3>Libre YSL</h3>
                <p>Lavanda e Flor de Laranjeira</p>
                <a href="#" class="btn">DETALHES</a>
            </div>

            </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Elegant Choice. O luxo que você merece.</p>
    </footer>

</body>
</html>
